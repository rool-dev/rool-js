name: CI/CD

on:
  push:
    branches: [main, 'release/**']
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  ci:
    name: Build and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Typecheck all packages
        run: pnpm typecheck

  publish-dev:
    name: Publish dev releases
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref_type == 'branch' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Set dev versions
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          for pkg in packages/sdk packages/svelte; do
            BASE_VERSION=$(node -p "require('./$pkg/package.json').version")
            DEV_VERSION="${BASE_VERSION}-dev.${SHORT_SHA}"
            echo "Setting $pkg to ${DEV_VERSION}"
            cd "$pkg"
            npm version "${DEV_VERSION}" --no-git-tag-version
            cd "$GITHUB_WORKSPACE"
          done

      - name: Publish SDK (dev)
        working-directory: packages/sdk
        run: npm publish --tag dev --access public

      - name: Publish Svelte (dev)
        working-directory: packages/svelte
        run: pnpm publish --tag dev --access public --no-git-checks

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Verify versions match tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          for pkg in packages/sdk packages/svelte; do
            PKG_NAME=$(node -p "require('./$pkg/package.json').name")
            PKG_VERSION=$(node -p "require('./$pkg/package.json').version")
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "Error: Tag version ($TAG_VERSION) doesn't match $PKG_NAME version ($PKG_VERSION)"
              exit 1
            fi
            echo "✓ $PKG_NAME: $PKG_VERSION"
          done

      # A backport release (e.g. v0.11.16 published after v0.12.0) must not
      # move the `latest` dist-tag backwards, so only tag `latest` when the
      # version exceeds what npm currently serves.
      - name: Determine npm dist-tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CURRENT=$(npm view @rool-dev/sdk version 2>/dev/null || echo "0.0.0")
          NEWER=$(node -e "
            const p = (v) => v.split('.').map(Number);
            const a = p('$TAG_VERSION'), b = p('$CURRENT');
            console.log(a[0] !== b[0] ? a[0] > b[0] : a[1] !== b[1] ? a[1] > b[1] : a[2] > b[2]);
          ")
          if [ "$NEWER" = "true" ]; then DIST_TAG=latest; else DIST_TAG=maintenance; fi
          echo "Publishing ${TAG_VERSION} with dist-tag '${DIST_TAG}' (npm latest is ${CURRENT})"
          echo "DIST_TAG=${DIST_TAG}" >> "$GITHUB_ENV"

      - name: Publish SDK
        working-directory: packages/sdk
        run: npm publish --access public --tag "$DIST_TAG"

      - name: Publish Svelte
        working-directory: packages/svelte
        run: pnpm publish --access public --no-git-checks --tag "$DIST_TAG"

