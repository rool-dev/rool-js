name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  ci:
    name: Build and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Typecheck all packages
        run: pnpm typecheck

  publish-dev:
    name: Publish dev releases
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref_type == 'branch' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Generate CLI README
        run: pnpm --filter @rool-dev/cli generate-readme

      - name: Set dev versions
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          for pkg in packages/sdk packages/cli packages/svelte; do
            BASE_VERSION=$(node -p "require('./$pkg/package.json').version")
            DEV_VERSION="${BASE_VERSION}-dev.${SHORT_SHA}"
            echo "Setting $pkg to ${DEV_VERSION}"
            cd "$pkg"
            npm version "${DEV_VERSION}" --no-git-tag-version
            cd "$GITHUB_WORKSPACE"
          done

      - name: Publish SDK (dev)
        working-directory: packages/sdk
        run: npm publish --tag dev --access public

      - name: Publish CLI (dev)
        working-directory: packages/cli
        run: pnpm publish --tag dev --access public --no-git-checks

      - name: Publish Svelte (dev)
        working-directory: packages/svelte
        run: pnpm publish --tag dev --access public --no-git-checks

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Generate CLI README
        run: pnpm --filter @rool-dev/cli generate-readme

      - name: Verify versions match tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          for pkg in packages/sdk packages/cli packages/svelte; do
            PKG_NAME=$(node -p "require('./$pkg/package.json').name")
            PKG_VERSION=$(node -p "require('./$pkg/package.json').version")
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "Error: Tag version ($TAG_VERSION) doesn't match $PKG_NAME version ($PKG_VERSION)"
              exit 1
            fi
            echo "✓ $PKG_NAME: $PKG_VERSION"
          done

      - name: Publish SDK
        working-directory: packages/sdk
        run: npm publish --access public

      - name: Publish CLI
        working-directory: packages/cli
        run: pnpm publish --access public --no-git-checks

      - name: Publish Svelte
        working-directory: packages/svelte
        run: pnpm publish --access public --no-git-checks
