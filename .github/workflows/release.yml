name: Release

on:
  push:
    tags: ['v*']

jobs:
  ci:
    name: Build and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Typecheck all packages
        run: pnpm typecheck

  publish:
    name: Publish all packages
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Generate CLI README
        run: pnpm --filter @rool-dev/cli generate-readme

      - name: Verify versions match tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          for pkg in packages/sdk packages/cli packages/svelte; do
            PKG_NAME=$(node -p "require('./$pkg/package.json').name")
            PKG_VERSION=$(node -p "require('./$pkg/package.json').version")
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "Error: Tag version ($TAG_VERSION) doesn't match $PKG_NAME version ($PKG_VERSION)"
              exit 1
            fi
            echo "✓ $PKG_NAME: $PKG_VERSION"
          done

      - name: Publish SDK
        working-directory: packages/sdk
        run: npm publish --access public

      - name: Publish CLI
        working-directory: packages/cli
        run: pnpm publish --access public --no-git-checks

      - name: Publish Svelte
        working-directory: packages/svelte
        run: pnpm publish --access public --no-git-checks
