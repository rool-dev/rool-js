<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Rool Auth Example</title>
    <style>
      /* Brand tokens borrowed from rool-website (minimal subset). */
      :root {
        --accent: #002dec;
        --beige: #efeae3;
        --white: #ffffff;
        --black: #000000;
        --black-2: #737373;
        --black-1: #a3a3a3;
        --orange-bg: #ffede6;
        --orange-fg: #e64700;
        --display: 'Outfit', system-ui, -apple-system, sans-serif;
        --body: 'Open Sans', system-ui, -apple-system, sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--beige);
        font-family: var(--body);
        color: var(--black);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2.5rem 1rem;
      }
      .card {
        width: 100%;
        max-width: 380px;
        background: var(--white);
        border-radius: 1.5rem;
        box-shadow: 0 24px 60px -24px rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(0, 0, 0, 0.05);
        padding: 1.75rem;
      }
      .logo { display: flex; justify-content: center; margin-bottom: 1.5rem; }
      .logo img { height: 1.75rem; }
      .kicker {
        text-align: center;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--black-1);
        margin-bottom: 0.5rem;
      }
      h1 {
        font-family: var(--display);
        font-size: 1.7rem;
        font-weight: 700;
        letter-spacing: -0.035em;
        text-align: center;
        margin: 0 0 0.25rem;
      }
      .sub { text-align: center; font-size: 0.875rem; color: var(--black-2); margin: 0 0 1.25rem; }
      input {
        width: 100%;
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 0.5rem;
        padding: 0.625rem 0.875rem;
        font-size: 0.875rem;
        font-family: inherit;
        margin-bottom: 0.625rem;
      }
      input:focus { outline: none; border-color: transparent; box-shadow: 0 0 0 2px var(--accent); }
      button { font-family: inherit; cursor: pointer; }
      .btn {
        width: 100%;
        border-radius: 9999px;
        padding: 0.625rem 1rem;
        font-size: 0.875rem;
        font-weight: 600;
        border: 1px solid transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.625rem;
        margin-bottom: 0.625rem;
      }
      .btn-primary { background: var(--accent); color: var(--white); }
      .btn-ghost { background: var(--white); color: var(--black); border-color: rgba(0, 0, 0, 0.1); font-weight: 500; }
      .btn-ghost:hover { background: rgba(0, 0, 0, 0.03); }
      .link {
        background: none; border: none; color: var(--accent);
        font-size: 0.78rem; font-weight: 500; text-decoration-line: underline; text-underline-offset: 4px;
      }
      .toggle-wrap { text-align: center; margin-bottom: 0.75rem; }
      .divider { display: flex; align-items: center; gap: 0.75rem; margin: 0.5rem 0 0.875rem; }
      .divider .line { height: 1px; flex: 1; background: rgba(0, 0, 0, 0.1); }
      .divider span { font-size: 0.625rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; color: var(--black-1); }
      .banner { border-radius: 0.5rem; padding: 0.625rem 0.875rem; font-size: 0.85rem; margin-bottom: 0.875rem; }
      .banner-error { background: var(--orange-bg); color: var(--orange-fg); }
      .banner-info { background: var(--beige); color: var(--black); }
      .user { font-size: 0.95rem; font-weight: 600; text-align: center; }
      .muted { color: var(--black-2); font-size: 0.8rem; }
      ul#spaces { list-style: none; padding: 0; margin: 0.5rem 0; }
      ul#spaces li { font-size: 0.85rem; padding: 0.4rem 0; border-top: 1px solid rgba(0, 0, 0, 0.06); }
      details.debug { margin-top: 1rem; }
      details.debug summary { font-size: 0.75rem; color: var(--black-1); cursor: pointer; }
      #log { background: rgba(0, 0, 0, 0.04); border-radius: 0.5rem; padding: 0.6rem; font-size: 0.72rem; white-space: pre-wrap; word-break: break-word; max-height: 12rem; overflow: auto; margin-top: 0.5rem; }
      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo"><img src="/rool-logotype.svg" alt="Rool" /></div>

      <!-- Signed out -->
      <section id="signed-out" hidden>
        <div class="kicker">Sign in</div>
        <h1>Welcome back</h1>
        <p class="sub">Pick up where you left off.</p>

        <div id="banner" class="banner" hidden></div>

        <form id="magic-form">
          <input type="email" id="magic-email" autocomplete="email" placeholder="you@example.com" required />
          <button type="submit" class="btn btn-primary">Email me a sign-in link</button>
        </form>

        <div class="toggle-wrap">
          <button type="button" id="password-toggle" class="link">I have a password</button>
        </div>

        <form id="password-form" hidden>
          <input type="email" id="pw-email" autocomplete="email" placeholder="you@example.com" required />
          <input type="password" id="pw-password" autocomplete="current-password" placeholder="Password" required />
          <button type="submit" class="btn btn-ghost">Sign in with password</button>
        </form>

        <div class="divider"><div class="line"></div><span>or</span><div class="line"></div></div>

        <button type="button" id="login-google" class="btn btn-ghost">
          <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Continue with Google</span>
        </button>

        <button type="button" id="login-apple" class="btn btn-ghost">
          <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.99 1.57-2.987 1.57-.12 0-.23-.02-.3-.03-.01-.06-.04-.22-.04-.39 0-1.15.572-2.27 1.206-2.98.804-.94 2.142-1.64 3.248-1.68.03.13.05.28.05.43zm4.565 15.71c-.03.07-.463 1.58-1.518 3.12-.945 1.34-1.94 2.71-3.43 2.71-1.517 0-1.9-.88-3.63-.88-1.698 0-2.302.91-3.67.91-1.377 0-2.332-1.26-3.428-2.8-1.287-1.82-2.323-4.63-2.323-7.28 0-4.28 2.797-6.55 5.552-6.55 1.448 0 2.675.95 3.6.95.865 0 2.222-1.01 3.902-1.01.613 0 2.886.06 4.374 2.19-.13.09-2.383 1.37-2.383 4.19 0 3.26 2.854 4.42 2.955 4.45z" fill="currentColor"/>
          </svg>
          <span>Continue with Apple</span>
        </button>

        <p class="sub" id="platform-note" hidden style="margin-top: 1rem; color: var(--orange-fg);">
          Running in a browser — custom-scheme deep links only complete on a device/emulator.
        </p>
      </section>

      <!-- Signed in -->
      <section id="signed-in" hidden>
        <div class="kicker">Signed in</div>
        <p class="user" id="user"></p>
        <p class="sub muted" id="user-sub"></p>
        <button type="button" id="refresh-spaces" class="btn btn-primary">List my spaces</button>
        <p class="muted" id="spaces-status"></p>
        <ul id="spaces"></ul>
        <button type="button" id="logout" class="btn btn-ghost">Sign out</button>
      </section>

      <details class="debug">
        <summary>Debug log</summary>
        <pre id="log"></pre>
      </details>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
